<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Recommender</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="page-container">

    <!-- HEADER -->
    <header class="header">
        <div class="header-content">
            <div class="logo-section">
                <h1 class="title">💡 QuoteSense</h1>
                <p class="subtitle">
                    Describe your feelings — get meaningful quotes instantly
                </p>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="main-content">

        <!-- SEARCH -->
        <section class="search-section">
            <div class="search-wrapper">
                <input 
                    type="text" 
                    id="query" 
                    class="search-input"
                    placeholder="e.g. I feel sad, need motivation..."
                    autocomplete="off"
                >
                <button class="search-button" onclick="getRecommendations()">
                    Find Quotes
                </button>
            </div>

            <!-- HINTS -->
            <div class="search-hints">
                <span class="hint-item">💪 Motivation: keep going</span>
                <span class="hint-item">💔 Sad: feeling lost</span>
                <span class="hint-item">🌱 Growth: self improvement</span>
                <span class="hint-item">✨ Success: achieve goals</span>
            </div>
        </section>

        <!-- RESULTS -->
        <section class="results-container">
            <div id="results" class="results"></div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>⚡ AI-powered semantic quote recommender</p>
    </footer>

</div>

<script src="/static/script.js"></script>
</body>
</html>
